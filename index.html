<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Novel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #0a0c10;
    --bg2:          #10131a;
    --border:       #1a1e2a;
    --text:         #c0c8dc;
    --dim:          #4a5268;
    --accent:       #4a9eff;
    --accent2:      #7ecfb0;
    --choice-bg:    #0c1520;
    --choice-hover: #101d30;
    --choice-bdr:   #1a3860;
    --cursor-col:   #4a9eff;
    --line-num:     #222840;
    --end-col:      #e07070;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nanum Gothic Coding', 'Noto Sans KR', monospace;
    font-size: 15px;
    line-height: 1.85;
    overflow: hidden;
  }

  #title-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 0.8s ease;
  }
  #title-screen.fade-out { opacity: 0; pointer-events: none; }
  #title-screen.hidden   { display: none; }

  .title-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 40%, rgba(30,60,120,0.18) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.018) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.018) 40px);
    pointer-events: none;
  }

  .title-tag {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    opacity: 0.7;
    margin-bottom: 28px;
    position: relative;
    animation: fadeslide 0.8s ease both;
  }
  .title-main {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 500;
    letter-spacing: 0.05em;
    color: #e8eeff;
    position: relative;
    text-align: center;
    animation: fadeslide 0.8s 0.1s ease both;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .title-sub {
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 0.12em;
    margin-top: 14px;
    position: relative;
    animation: fadeslide 0.8s 0.2s ease both;
  }
  .title-divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 36px 0;
    position: relative;
    animation: fadein 1s 0.3s ease both;
  }
  .btn-start {
    position: relative;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 14px 52px;
    font-family: 'Nanum Gothic Coding', monospace;
    font-size: 14px;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.25s;
    animation: fadein 1s 0.5s ease both;
    overflow: hidden;
  }
  .btn-start::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .btn-start:hover::before { opacity: 0.08; }
  .btn-start:hover { box-shadow: 0 0 24px rgba(74,158,255,0.2); letter-spacing: 0.28em; }
  .btn-start span { position: relative; z-index: 1; }
  .title-footer {
    position: absolute;
    bottom: 24px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.06em;
    animation: fadein 1.2s 0.8s ease both;
  }

  @keyframes fadeslide {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadein {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  #end-screen {
    position: fixed; inset: 0;
    background: rgba(10,12,16,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 150;
    backdrop-filter: blur(4px);
    animation: fadein 0.6s ease;
  }
  #end-screen.visible { display: flex; }
  .end-symbol { font-size: 13px; letter-spacing: 0.3em; color: var(--end-col); opacity: 0.7; }
  .end-title  { font-size: 28px; color: #e8eeff; font-family: 'Noto Sans KR', sans-serif; font-weight: 400; letter-spacing: 0.05em; }
  .end-sub    { font-size: 12px; color: var(--dim); letter-spacing: 0.15em; }
  .end-divider { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--dim), transparent); }
  .btn-restart {
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    padding: 12px 40px;
    font-family: 'Nanum Gothic Coding', monospace;
    font-size: 13px;
    letter-spacing: 0.18em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.25s;
    margin-top: 8px;
  }
  .btn-restart:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 16px rgba(74,158,255,0.12); }

  #game-ui {
    display: flex;
    flex-direction: column;
    height: 100vh;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #game-ui.visible { opacity: 1; }

  #topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #e05555; }
  .dot-y { background: #e0b055; }
  .dot-g { background: #55b855; }
  #title-bar { font-size: 12px; color: var(--dim); font-weight: 400; letter-spacing: 0.08em; margin-left: 6px; }

  #console {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px 12px;
    scroll-behavior: smooth;
  }
  #console::-webkit-scrollbar { width: 4px; }
  #console::-webkit-scrollbar-track { background: transparent; }
  #console::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .c-line { display: flex; gap: 16px; padding: 1px 0; animation: fadein 0.15s ease; }
  .c-num  { color: var(--line-num); font-size: 11px; min-width: 34px; text-align: right; padding-top: 3px; user-select: none; flex-shrink: 0; font-family: 'Nanum Gothic Coding', monospace; }
  .c-text { flex: 1; word-break: break-word; }
  .c-text.empty  { min-height: 1.5em; }
  .c-text.chosen { color: var(--accent); }
  .c-text.sys    { color: var(--dim); font-style: italic; }

  #typing-wrap { display: flex; gap: 16px; padding: 1px 0; min-height: 1.85em; }
  #typing-wrap .c-num { color: var(--line-num); font-size: 11px; min-width: 34px; text-align: right; padding-top: 3px; }
  #typing-text { flex: 1; }
  #cursor {
    display: inline-block;
    width: 8px; height: 15px;
    background: var(--cursor-col);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 0.85s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  #choice-panel {
    padding: 14px 32px 14px calc(32px + 34px + 16px);
    display: none;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  #choice-panel.visible { display: flex; }
  .choice-label { font-size: 11px; color: var(--dim); letter-spacing: 0.1em; margin-bottom: 2px; }
  .choice-btn {
    background: var(--choice-bg);
    border: 1px solid var(--choice-bdr);
    border-left: 3px solid var(--accent);
    color: var(--text);
    padding: 10px 18px;
    text-align: left;
    font-family: 'Nanum Gothic Coding', monospace;
    font-size: 14px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .choice-btn::before { content: '›  '; color: var(--accent); }
  .choice-btn:hover { background: var(--choice-hover); border-color: var(--accent); color: #fff; transform: translateX(4px); }

  #statusbar {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 5px 16px;
    font-size: 11px;
    color: var(--dim);
    display: flex;
    gap: 20px;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }
  #status-file { color: var(--accent2); }
</style>
</head>
<body>

<div id="title-screen">
  <div class="title-bg"></div>
  <div class="title-tag">INTERACTIVE NOVEL</div>
  <div class="title-main" id="game-title">이야기</div>
  <div class="title-sub" id="game-subtitle">— an adventure —</div>
  <div class="title-divider"></div>
  <button class="btn-start" onclick="startGame()"><span>게임 시작</span></button>
  <div class="title-footer">타이핑 중 클릭하면 즉시 출력됩니다</div>
</div>

<div id="end-screen">
  <div class="end-symbol">- END -</div>
  <div class="end-title">이야기가 끝났습니다</div>
  <div class="end-sub">모든 기록은 사라집니다</div>
  <div class="end-divider"></div>
  <button class="btn-restart" onclick="restartGame()">처음부터 다시하기</button>
</div>

<div id="game-ui">
  <div id="topbar">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <div id="title-bar">loading...</div>
  </div>
  <div id="console">
    <div id="history"></div>
    <div id="typing-wrap">
      <div class="c-num" id="typing-linenum"></div>
      <div id="typing-text"><span id="cursor"></span></div>
    </div>
    <div id="bottom-anchor"></div>
  </div>
  <div id="choice-panel"></div>
  <div id="statusbar">
    <span>파일: <span id="status-file">—</span></span>
    <span>줄: <span id="status-line">—</span></span>
    <span id="status-msg"></span>
  </div>
</div>

<script>
const CONFIG = {
  title:     '제목 없는 이야기',
  subtitle:  '— an adventure —',
  startFile: '1.txt'
};

const CACHE = {};
let curFile = '', curLine = 0, lineCount = 0;
let typing = false, skipTyping = false;

document.getElementById('game-title').textContent    = CONFIG.title;
document.getElementById('game-subtitle').textContent = CONFIG.subtitle;
document.title = CONFIG.title;

function startGame() {
  const ts = document.getElementById('title-screen');
  const ui = document.getElementById('game-ui');
  ts.classList.add('fade-out');
  setTimeout(() => {
    ts.classList.add('hidden');
    ui.classList.add('visible');
    navigate(CONFIG.startFile, 0);
  }, 800);
}

function restartGame() {
  document.getElementById('end-screen').classList.remove('visible');
  document.getElementById('history').innerHTML = '';
  const tt = document.getElementById('typing-text');
  tt.innerHTML = '<span id="cursor"></span>';
  document.getElementById('typing-linenum').textContent = '';
  hideChoices();
  lineCount = 0; typing = false; skipTyping = false;
  Object.keys(CACHE).forEach(k => delete CACHE[k]);

  const ts = document.getElementById('title-screen');
  const ui = document.getElementById('game-ui');
  ts.style.transition = 'none';
  ts.style.opacity = '1';
  ts.classList.remove('fade-out', 'hidden');
  ui.classList.remove('visible');
  setTimeout(() => { ts.style.transition = ''; }, 50);
}

async function fetchFile(filename) {
  if (CACHE[filename]) return CACHE[filename];
  try {
    const res = await fetch(filename);
    if (!res.ok) throw new Error(res.status);
    const text = await res.text();
    CACHE[filename] = text.split(/\r?\n/);
    return CACHE[filename];
  } catch(e) {
    setStatus(`파일 로드 실패: ${filename}`, true);
    return null;
  }
}

async function navigate(filename, lineIndex) {
  const lines = await fetchFile(filename);
  if (!lines) return;
  curFile = filename;
  curLine = lineIndex;
  document.getElementById('status-file').textContent = filename;
  document.getElementById('title-bar').textContent = `${CONFIG.title}  ·  ${filename}`;
  hideChoices();
  processNext();
}

function processNext() {
  const lines = CACHE[curFile];
  if (!lines || curLine >= lines.length) { showEnd(); return; }

  const raw = lines[curLine];

  if (raw.trimStart().startsWith('>')) {
    const block = [];
    let i = curLine;
    while (i < lines.length && lines[i].trimStart().startsWith('>')) {
      block.push(lines[i].trimStart());
      i++;
    }
    curLine = i;

    if (block.length === 1 && /^\[end\]/i.test(block[0].slice(1).trim())) {
      showEnd(); return;
    }

    const choices = block.map(parseChoice).filter(Boolean);

    if (choices.length === 1) {
      const c = choices[0];
      if (!c.label && c.file) { navigate(c.file, c.line - 1); return; }
      showChoices(choices);
    } else {
      showChoices(choices);
    }
    return;
  }

  curLine++;
  typewriteLine(raw, () => processNext());
}

function parseChoice(raw) {
  let s = raw.replace(/^>\s*/, '');
  if (/^\[end\]/i.test(s.trim())) return { end: true, label: 'END', file: null, line: null };
  const m = s.match(/^(.*?)\[([^\],]+),\s*(\d+)\]\s*$/);
  if (m) return { label: m[1].trim(), file: m[2].trim(), line: parseInt(m[3]) };
  if (s.trim()) return { label: s.trim(), file: null, line: null };
  return null;
}

function showEnd() {
  commitLine('', false, 'sys');
  setTimeout(() => {
    document.getElementById('end-screen').classList.add('visible');
  }, 600);
}

function typewriteLine(text, callback) {
  typing = true; skipTyping = false;

  if (text.trim()) lineCount++;
  const num = text.trim() ? lineCount : '';

  document.getElementById('typing-linenum').textContent = num;
  document.getElementById('status-line').textContent    = curLine;

  const typingText = document.getElementById('typing-text');
  typingText.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.id = 'cursor';
  typingText.appendChild(cursor);

  if (!text.trim()) {
    typing = false;
    commitLine('', false, '');
    setTimeout(callback, 80);
    return;
  }

  let i = 0;
  const delay = calcDelay(text);
  const skipHandler = () => { skipTyping = true; };
  document.getElementById('console').addEventListener('click', skipHandler, { once: true });

  function tick() {
    if (skipTyping) {
      typingText.textContent = text;
      const c2 = document.createElement('span'); c2.id = 'cursor';
      typingText.appendChild(c2);
      finish(); return;
    }
    if (i < text.length) {
      cursor.insertAdjacentText('beforebegin', text[i++]);
      scrollBottom();
      setTimeout(tick, delay);
    } else { finish(); }
  }

  function finish() {
    document.getElementById('console').removeEventListener('click', skipHandler);
    typing = false;
    commitLine(text, false, '');
    const tt = document.getElementById('typing-text');
    tt.innerHTML = '';
    const c3 = document.createElement('span'); c3.id = 'cursor';
    tt.appendChild(c3);
    document.getElementById('typing-linenum').textContent = '';
    scrollBottom();
    setTimeout(callback, 110);
  }

  tick();
}

function calcDelay(text) {
  const l = text.length;
  if (l < 15)  return 65;
  if (l < 40)  return 45;
  if (l < 100) return 30;
  return 20;
}

function commitLine(text, isChoice, cls) {
  const history = document.getElementById('history');
  const div = document.createElement('div');
  div.className = 'c-line';

  const numEl = document.createElement('div');
  numEl.className = 'c-num';
  numEl.textContent = text.trim() ? lineCount : '';

  const textEl = document.createElement('div');
  textEl.className = 'c-text' + (text === '' ? ' empty' : '') + (cls ? ' ' + cls : '');
  textEl.textContent = text;

  div.appendChild(numEl);
  div.appendChild(textEl);
  history.appendChild(div);
  scrollBottom();
}

function showChoices(choices) {
  const panel = document.getElementById('choice-panel');
  panel.innerHTML = '<div class="choice-label">▸ 선택하세요</div>';
  choices.forEach(c => {
    if (!c) return;
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label || `→ ${c.file}`;
    btn.addEventListener('click', () => {
      lineCount++;
      commitLine(`› ${btn.textContent}`, true, 'chosen');
      hideChoices();
      if (c.end) { showEnd(); return; }
      if (c.file) navigate(c.file, c.line - 1);
      else processNext();
    });
    panel.appendChild(btn);
  });
  panel.classList.add('visible');
  scrollBottom();
}

function hideChoices() {
  const panel = document.getElementById('choice-panel');
  panel.classList.remove('visible');
  panel.innerHTML = '';
}

function scrollBottom() {
  document.getElementById('bottom-anchor').scrollIntoView({ behavior: 'smooth', block: 'end' });
}
function setStatus(msg, err) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.style.color = err ? '#e05555' : 'var(--dim)';
}
</script>
</body>
</html>
